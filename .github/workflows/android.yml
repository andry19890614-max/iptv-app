name: Build APK

on:
workflow_dispatch:

jobs:
build:
runs-on: ubuntu-latest

```
defaults:
  run:
    working-directory: iptv-app   # 🔥 ВАЖЛИВО! зміни якщо інша папка

steps:
  - name: Checkout
    uses: actions/checkout@v3

  - name: Setup Node
    uses: actions/setup-node@v3
    with:
      node-version: 18

  - name: Install dependencies
    run: npm install

  - name: Build project
    run: npm run build

  - name: Install Capacitor
    run: npm install @capacitor/core @capacitor/cli

  - name: Setup Capacitor
    run: |
      npx cap init iptv com.example.iptv || true
      npx cap add android || true
      npx cap sync

  - name: Setup Java
    uses: actions/setup-java@v3
    with:
      distribution: temurin
      java-version: 17

  - name: Build APK
    run: |
      cd android
      chmod +x gradlew
      ./gradlew assembleDebug

  - name: Upload APK
    uses: actions/upload-artifact@v3
    with:
      name: apk
      path: iptv-app/android/app/build/outputs/apk/debug/app-debug.apk
```
