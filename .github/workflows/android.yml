name: Build APK

on:
workflow_dispatch:

jobs:
build:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout
    uses: actions/checkout@v3

  - name: Setup Node
    uses: actions/setup-node@v3
    with:
      node-version: 18

  - name: Install dependencies
    run: npm install

  - name: Build web
    run: npm run build

  - name: Install Capacitor
    run: npm install @capacitor/core @capacitor/cli

  - name: Init Capacitor
    run: |
      npx cap init iptv com.example.iptv
      npx cap add android

  - name: Sync
    run: npx cap sync

  - name: Build APK
    run: |
      cd android
      ./gradlew assembleDebug

  - name: Upload APK
    uses: actions/upload-artifact@v3
    with:
      name: app-debug
      path: android/app/build/outputs/apk/debug/app-debug.apk
```
