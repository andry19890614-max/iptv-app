name: Build APK

on:
workflow_dispatch:

jobs:
build:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout repo
    uses: actions/checkout@v3

  - name: Setup Node
    uses: actions/setup-node@v3
    with:
      node-version: 18

  - name: Install dependencies
    run: npm install

  - name: Build web app
    run: npm run build

  - name: Install Capacitor
    run: npm install @capacitor/core @capacitor/cli

  - name: Create Capacitor config (if missing)
    run: npx cap init iptv com.example.iptv || echo "Already initialized"

  - name: Add Android platform
    run: npx cap add android || echo "Android already added"

  - name: Sync project
    run: npx cap sync

  - name: Setup Java
    uses: actions/setup-java@v3
    with:
      distribution: temurin
      java-version: 17

  - name: Build APK
    run: |
      cd android
      chmod +x gradlew
      ./gradlew assembleDebug

  - name: Upload APK
    uses: actions/upload-artifact@v3
    with:
      name: app-debug
      path: android/app/build/outputs/apk/debug/app-debug.apk
```
